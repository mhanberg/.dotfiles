name: Build and cache

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
  push:
    branches:
      - main

permissions: {}

jobs:
  build-hm:
    strategy:
      matrix:
        include:
          - { host: "mitchell@nublar", os: "ubuntu-latest" }
          - { host: "mitchell@mitchells-mini", os: "macos-latest" }
          - { host: "mitchell@mitchells-air", os: "macos-latest" }
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup SSH key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - uses: NixOS/nix-installer-action@main
        with:
          extra_conf: |
            extra-substituters = https://mhanberg.cachix.org
            extra-trusted-public-keys = mhanberg.cachix.org-1:tpHVw70kbGnO5mGv4rA3pjxpqeEiP/vWfJT4tVaK85o=
            accept-flake-config = true
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mhanberg
          # If you chose API tokens for write access OR if you have a private cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: false
          cachixArgs: "--verbose"
      - run: nix run home-manager/master -- build --flake ".#${{ matrix.host }}"

  nix-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        host:
          - "mitchells-mini"
          - "mitchells-air"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup SSH key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - uses: NixOS/nix-installer-action@main
        with:
          extra_conf: |
            extra-substituters = https://mhanberg.cachix.org
            extra-trusted-public-keys = mhanberg.cachix.org-1:tpHVw70kbGnO5mGv4rA3pjxpqeEiP/vWfJT4tVaK85o=
            accept-flake-config = true
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mhanberg
          # If you chose API tokens for write access OR if you have a private cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: false
          cachixArgs: "--verbose"
      - run: sudo nix run nix-darwin -- build --flake ".#${{ matrix.host }}"
